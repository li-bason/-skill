<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Final Exam Prep 创意概念海报</title>
  <desc id="desc">从考试范围开始，经过考点拆解和定向检索，最终生成复习资料与练习闭环。</desc>
  <rect width="1440" height="810" fill="#f3f1ea"/><path d="M0 0h1440v18H0z" fill="#c7000b"/>
  <g font-family="Microsoft YaHei, sans-serif"><text x="84" y="106" font-size="22" fill="#c7000b" font-weight="700">FINAL EXAM PREP · 考点驱动复习编译器</text>
  <text x="80" y="188" font-size="58" fill="#171717" font-weight="700">不是把资料读完，</text><text x="80" y="258" font-size="58" fill="#171717" font-weight="700">而是把考试范围编译成行动。</text>
  <text x="84" y="310" font-size="22" fill="#5b5b5b">先锁定考点，再定向抽取；每一页材料、每一道题，都能追溯到考试目标。</text>
  <rect x="82" y="386" width="250" height="164" fill="#171717"/><text x="108" y="428" font-size="18" fill="#d8d3c8">01 · SCOPE</text><text x="108" y="474" font-size="30" fill="#fff" font-weight="700">考试范围</text><text x="108" y="516" font-size="17" fill="#c7c7c7">大纲 · 题型 · 教师要点</text>
  <path d="M332 468h62m-12-14 18 14-18 14" fill="none" stroke="#c7000b" stroke-width="6"/>
  <rect x="410" y="386" width="250" height="164" fill="#fff" stroke="#171717" stroke-width="2"/><text x="436" y="428" font-size="18" fill="#c7000b">02 · ATOMS</text><text x="436" y="474" font-size="30" fill="#171717" font-weight="700">原子考点</text><text x="436" y="516" font-size="17" fill="#5b5b5b">定义 · 比较 · 流程 · 计算</text>
  <path d="M660 468h62m-12-14 18 14-18 14" fill="none" stroke="#c7000b" stroke-width="6"/>
  <rect x="738" y="386" width="250" height="164" fill="#c7000b"/><text x="764" y="428" font-size="18" fill="#ffd9dc">03 · RETRIEVE</text><text x="764" y="474" font-size="30" fill="#fff" font-weight="700">定向抽取</text><text x="764" y="516" font-size="17" fill="#ffe9eb">只取命中页，不搬整本书</text>
  <path d="M988 468h62m-12-14 18 14-18 14" fill="none" stroke="#171717" stroke-width="6"/>
  <rect x="1066" y="386" width="292" height="164" fill="#fff" stroke="#171717" stroke-width="2"/><text x="1092" y="428" font-size="18" fill="#c7000b">04 · LEARN</text><text x="1092" y="474" font-size="30" fill="#171717" font-weight="700">复习闭环</text><text x="1092" y="516" font-size="17" fill="#5b5b5b">知识点 · 导图 · 题库 · 答案</text>
  <line x1="82" y1="632" x2="1358" y2="632" stroke="#c8c3b8"/><text x="82" y="684" font-size="19" fill="#171717" font-weight="700">核心创新</text><text x="82" y="724" font-size="18" fill="#5b5b5b">范围先行 / 页级检索 / 可追溯证据链 / 自动质量门禁 / 多端可读交付</text><text x="1130" y="724" font-size="18" fill="#c7000b" font-weight="700">为鸿蒙高校创新赛而设计</text></g>
</svg>
